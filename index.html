<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanStock — Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #2a2f3f;
    --accent: #00e5a0;
    --accent2: #005c41;
    --warn: #ff6b35;
    --text: #e8eaf0;
    --text-dim: #6b7290;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 0 16px 80px; }

  header {
    padding: 24px 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; color: var(--accent); }
  .logo span { color: var(--text-dim); font-weight: 400; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: #000; }

  .page { display: none; }
  .page.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-family: var(--mono);
  }

  #qr-reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
  #qr-reader video { border-radius: 12px; }
  #qr-reader img { display: none !important; }

  .scan-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .scan-btn:hover { background: var(--accent); color: #000; }
  .scan-btn.scanning { background: var(--warn); border-color: var(--warn); color: #fff; }

  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--mono);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 1rem;
    padding: 12px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  input.filled { border-color: var(--accent2); color: var(--accent); }

  .scanned-code {
    background: var(--surface2);
    border: 1px solid var(--accent2);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    min-height: 46px;
    display: flex;
    align-items: center;
    gap: 8px;
    word-break: break-all;
  }
  .scanned-code .placeholder { color: var(--text-dim); font-size: 0.85rem; }
  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .save-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,160,0.3); }
  .save-btn:active { transform: translateY(0); }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .log-count { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); }
  .clear-btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--warn);
    background: none;
    border: 1px solid var(--warn);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .clear-btn:hover { opacity: 1; }

  .log-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.85rem;
    line-height: 1.8;
  }

  .log-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.78rem; }
  thead th {
    text-align: left;
    padding: 8px 10px;
    color: var(--text-dim);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 10px; vertical-align: middle; }
  .td-item { color: var(--accent); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-bin { color: var(--text); }
  .td-qty { color: #fff; font-weight: 600; text-align: right; }
  .td-time { color: var(--text-dim); font-size: 0.7rem; white-space: nowrap; }
  .del-row {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .del-row:hover { color: var(--warn); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); display: block; line-height: 1; margin-bottom: 4px; }
  .stat-lbl { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Scan<span>Stock</span></div>
    <div style="font-family:var(--mono);font-size:0.7rem;color:var(--text-dim)" id="clock"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-scan" onclick="switchTab('scan', this)">&#9632; Scan Entry</button>
    <button class="tab-btn" id="tab-log" onclick="switchTab('log', this)">&#9776; Log</button>
  </div>

  <!-- SCAN PAGE -->
  <div class="page active" id="page-scan">

    <div class="card">
      <div class="card-title">&#9654; QR / Barcode Scanner</div>
      <div id="qr-reader" style="display:none;margin-bottom:12px;"></div>
      <button class="scan-btn" id="scanToggleBtn" onclick="toggleScanner()">
        <span>&#9641;</span> Start Camera Scanner
      </button>
    </div>

    <div class="card">
      <div class="card-title">&#9670; Item Code</div>
      <div class="scanned-code" id="codeDisplay">
        <span class="placeholder">Scan QR or enter manually below…</span>
      </div>
      <div class="field" style="margin-top:12px;">
        <label>Manual Item Code</label>
        <input type="text" id="itemCodeInput" placeholder="e.g. SKU-00421" oninput="syncCode(this.value)">
      </div>
    </div>

    <div class="card">
      <div class="card-title">&#9632; Entry Details</div>
      <div class="field">
        <label>Bin Location</label>
        <input type="text" id="binInput" placeholder="e.g. A-12, Rack 3B">
      </div>
      <div class="field">
        <label>Quantity</label>
        <input type="number" id="qtyInput" placeholder="Enter quantity" min="0" step="1">
      </div>
      <button class="save-btn" onclick="saveEntry()">Save Entry</button>
    </div>

  </div>

  <!-- LOG PAGE -->
  <div class="page" id="page-log">

    <div class="stats">
      <div class="stat"><span class="stat-val" id="stat-entries">0</span><span class="stat-lbl">Entries</span></div>
      <div class="stat"><span class="stat-val" id="stat-items">0</span><span class="stat-lbl">Items</span></div>
      <div class="stat"><span class="stat-val" id="stat-qty">0</span><span class="stat-lbl">Total Qty</span></div>
    </div>

    <div class="card">
      <div class="log-header">
        <div class="card-title" style="margin:0">&#9776; Entry Log</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="log-count" id="logCount">0 records</span>
          <button class="clear-btn" onclick="clearLog()">Clear All</button>
        </div>
      </div>
      <div class="log-table-wrap" id="logContainer">
        <div class="log-empty">No entries yet.<br>Scan or enter an item to get started.</div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let html5QrCode = null;
  let scanning = false;
  let currentCode = '';

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }
  updateClock();
  setInterval(updateClock, 1000);

  function switchTab(tab, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    btn.classList.add('active');
    if (tab === 'log') renderLog();
    if (tab === 'scan' && scanning) stopScanner();
  }

  function toggleScanner() {
    if (scanning) { stopScanner(); return; }
    startScanner();
  }

  function startScanner() {
    const btn = document.getElementById('scanToggleBtn');
    const readerEl = document.getElementById('qr-reader');
    readerEl.style.display = 'block';
    btn.className = 'scan-btn scanning';
    btn.innerHTML = '<span>&#9632;</span> Stop Scanner';
    scanning = true;

    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.0 },
      onScanSuccess,
      () => {}
    ).catch(err => {
      showToast('Camera unavailable');
      stopScanner();
    });
  }

  function stopScanner() {
    if (html5QrCode && scanning) {
      html5QrCode.stop().then(() => {
        html5QrCode.clear();
        html5QrCode = null;
      }).catch(() => {});
    }
    scanning = false;
    const btn = document.getElementById('scanToggleBtn');
    btn.className = 'scan-btn';
    btn.innerHTML = '<span>&#9641;</span> Start Camera Scanner';
    document.getElementById('qr-reader').style.display = 'none';
  }

  function onScanSuccess(decodedText) {
    stopScanner();
    setCode(decodedText);
    showToast('Scanned ✓');
    document.getElementById('binInput').focus();
  }

  function setCode(val) {
    currentCode = val;
    document.getElementById('codeDisplay').innerHTML =
      '<span class="pulse-dot"></span>' + escHtml(val);
    const inp = document.getElementById('itemCodeInput');
    inp.value = val;
    inp.classList.add('filled');
  }

  function syncCode(val) {
    currentCode = val;
    const display = document.getElementById('codeDisplay');
    if (val) {
      display.innerHTML = '<span class="pulse-dot"></span>' + escHtml(val);
    } else {
      display.innerHTML = '<span class="placeholder">Scan QR or enter manually below…</span>';
    }
  }

  function saveEntry() {
    const code = (currentCode || document.getElementById('itemCodeInput').value).trim();
    const bin = document.getElementById('binInput').value.trim();
    const qtyVal = document.getElementById('qtyInput').value.trim();

    if (!code) { showToast('Item code is required'); return; }
    if (!bin)  { showToast('Bin location is required'); return; }
    if (qtyVal === '' || isNaN(Number(qtyVal))) { showToast('Valid quantity is required'); return; }

    const entry = {
      id: Date.now(),
      code,
      bin,
      qty: Number(qtyVal),
      time: new Date().toISOString()
    };

    const log = getLog();
    log.unshift(entry);
    saveLog(log);
    showToast('Entry saved ✓');
    resetForm();
  }

  function resetForm() {
    currentCode = '';
    document.getElementById('itemCodeInput').value = '';
    document.getElementById('itemCodeInput').classList.remove('filled');
    document.getElementById('binInput').value = '';
    document.getElementById('qtyInput').value = '';
    document.getElementById('codeDisplay').innerHTML =
      '<span class="placeholder">Scan QR or enter manually below…</span>';
  }

  function getLog() {
    try { return JSON.parse(localStorage.getItem('scanstock_log') || '[]'); } catch { return []; }
  }
  function saveLog(log) {
    localStorage.setItem('scanstock_log', JSON.stringify(log));
  }

  function renderLog() {
    const log = getLog();
    const container = document.getElementById('logContainer');

    const uniqueItems = new Set(log.map(e => e.code)).size;
    const totalQty = log.reduce((s, e) => s + e.qty, 0);
    document.getElementById('stat-entries').textContent = log.length;
    document.getElementById('stat-items').textContent = uniqueItems;
    document.getElementById('stat-qty').textContent = totalQty;
    document.getElementById('logCount').textContent = log.length + ' record' + (log.length !== 1 ? 's' : '');

    if (!log.length) {
      container.innerHTML = '<div class="log-empty">No entries yet.<br>Scan or enter an item to get started.</div>';
      return;
    }

    const rows = log.map(e => {
      const d = new Date(e.time);
      const dateStr = d.toLocaleDateString([], {month:'short', day:'numeric'});
      const timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      return `<tr>
        <td class="td-item" title="${escHtml(e.code)}">${escHtml(e.code)}</td>
        <td class="td-bin">${escHtml(e.bin)}</td>
        <td class="td-qty">${e.qty}</td>
        <td class="td-time">${dateStr}<br>${timeStr}</td>
        <td><button class="del-row" onclick="deleteEntry(${e.id})">✕</button></td>
      </tr>`;
    }).join('');

    container.innerHTML = `<table>
      <thead><tr>
        <th>Item Code</th>
        <th>Bin</th>
        <th style="text-align:right">Qty</th>
        <th>Time</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function deleteEntry(id) {
    const log = getLog().filter(e => e.id !== id);
    saveLog(log);
    renderLog();
  }

  function clearLog() {
    if (!confirm('Clear all log entries? This cannot be undone.')) return;
    saveLog([]);
    renderLog();
    showToast('Log cleared');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
